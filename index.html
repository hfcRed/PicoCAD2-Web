<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>picocad2-web</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.indigo.min.css"
    />
  </head>
  <body>
    <main class="container">
      <h1>PicoCAD 2 Web</h1>
      <section>
        <h2>Performance Test</h2>
        <fieldset role="group">
          <input type="number" id="perf-count" value="6" min="1" max="500" />
          <button id="perf-apply" type="button">Apply</button>
        </fieldset>
        <small id="perf-stats">---</small>
        <div id="perf-grid"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
